{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1 class="mb-4">Редактировать отель: {{ hotel.name }}</h1>
    
    <form method="POST">
        <div class="row">
            <div class="col-md-8">
                <div class="card mb-4">
                    <div class="card-header">
                        <h5>Основная информация</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Название отеля</label>
                            <input type="text" class="form-control" name="name" value="{{ hotel.name }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Город</label>
                            <input type="text" class="form-control" name="city" value="{{ hotel.city }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Адрес</label>
                            <input type="text" class="form-control" name="address" value="{{ hotel.address }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Описание</label>
                            <textarea class="form-control" name="description" rows="4" required>{{ hotel.description }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">URL изображения</label>
                            <input type="text" class="form-control" name="image_url" value="{{ hotel.image_url }}">
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card mb-4">
                    <div class="card-header">
                        <h5>Тарифы</h5>
                        <button type="button" class="btn btn-sm btn-success" onclick="addTariff()">Добавить тариф</button>
                    </div>
                    <div class="card-body" id="tariffsContainer">
                        {% for tariff in hotel.tariffs %}
                        <div class="tariff-item mb-3">
                            <input type="hidden" name="tariff_id[]" value="{{ tariff.id }}">
                            <input type="text" class="form-control mb-2" name="tariff_name[]" value="{{ tariff.name }}" required>
                            <input type="number" class="form-control mb-2" name="tariff_price[]" value="{{ tariff.price_per_night }}" step="0.01" required>
                            <textarea class="form-control" name="tariff_description[]" rows="2">{{ tariff.description }}</textarea>
                            <button type="button" class="btn btn-sm btn-danger mt-2" onclick="this.parentElement.remove()">Удалить</button>
                            <hr>
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary">Сохранить изменения</button>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>

<script>
function addTariff() {
    const container = document.getElementById('tariffsContainer');
    const newTariff = document.createElement('div');
    newTariff.className = 'tariff-item mb-3';
    newTariff.innerHTML = `
        <input type="hidden" name="tariff_id[]" value="">
        <input type="text" class="form-control mb-2" name="tariff_name[]" placeholder="Название тарифа (Люкс, Эконом и т.д.)" required>
        <input type="number" class="form-control mb-2" name="tariff_price[]" placeholder="Цена за ночь" step="0.01" required>
        <textarea class="form-control" name="tariff_description[]" placeholder="Описание тарифа" rows="2"></textarea>
        <button type="button" class="btn btn-sm btn-danger mt-2" onclick="this.parentElement.remove()">Удалить</button>
        <hr>
    `;
    container.appendChild(newTariff);
}
</script>
{% endblock %}
