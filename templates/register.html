{% extends "base.html" %}

{% block title %}Регистрация | 2RIST{% endblock %}

{% block hero_small %}1{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-form">
        <h2>Регистрация</h2>
        <form method="POST">
            <div class="form-group">
                <label>Логин</label>
                <input type="text" name="username" required placeholder="Придумайте логин">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="example@mail.ru">
            </div>
            <div class="form-group">
                <label>Полное имя</label>
                <input type="text" name="full_name" placeholder="Иван Иванов">
            </div>
            <div class="form-group">
                <label>Телефон</label>
                <input type="tel" name="phone" placeholder="+7 (999) 123-45-67">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" required placeholder="Минимум 6 символов">
            </div>
            <button type="submit" class="btn-submit">Зарегистрироваться</button>
        </form>
        <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem; color: var(--text-gray);">
            Уже есть аккаунт? <a href="{{ url_for('login') }}" style="color: var(--primary-orange);">Войти</a>
        </p>
    </div>
</div>
{% endblock %}
